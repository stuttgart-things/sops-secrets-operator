---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: objectsources.sops.stuttgart-things.com
spec:
  group: sops.stuttgart-things.com
  names:
    kind: ObjectSource
    listKind: ObjectSourceList
    plural: objectsources
    singular: objectsource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .spec.bucket.name
      name: Bucket
      type: string
    - jsonPath: .status.lastSyncedETag
      name: ETag
      type: string
    - jsonPath: .status.conditions[?(@.type=="SourceReady")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: ObjectSource is a remote HTTPS or S3-compatible source of SOPS-encrypted
          files.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ObjectSourceSpec describes an HTTPS URL or S3-compatible bucket from
              which to fetch a single SOPS-encrypted file.

              Exactly one of `url` or `bucket` must be set.
            properties:
              auth:
                description: |-
                  ObjectAuth configures authentication for an ObjectSource.

                  For "none" the SecretRef must be omitted. For every other type a
                  SecretRef is required with backend-appropriate keys.
                properties:
                  secretRef:
                    description: LocalObjectReference is a reference to an object
                      in the same namespace.
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  type:
                    description: ObjectAuthType identifies the authentication method
                      for an ObjectSource.
                    enum:
                    - none
                    - bearer
                    - basic
                    - s3
                    type: string
                required:
                - type
                type: object
              bucket:
                description: |-
                  Bucket configures an S3-compatible object to GET. Mutually
                  exclusive with URL. The object key is taken from the consumer's
                  source.path field.
                properties:
                  endpoint:
                    description: |-
                      Endpoint is the bucket endpoint (host[:port]), e.g. "s3.amazonaws.com"
                      or "minio.internal:9000". Must not include a scheme.
                    minLength: 1
                    type: string
                  insecure:
                    description: |-
                      Insecure disables TLS when talking to the bucket endpoint.
                      Defaults to false.
                    type: boolean
                  name:
                    minLength: 1
                    type: string
                  region:
                    type: string
                required:
                - endpoint
                - name
                type: object
              interval:
                description: Interval between reconciles. Defaults to 5m.
                type: string
              url:
                description: URL is an HTTPS URL to GET. Mutually exclusive with Bucket.
                type: string
            type: object
            x-kubernetes-validations:
            - message: exactly one of spec.url or spec.bucket must be set
              rule: '(has(self.url) ? 1 : 0) + (has(self.bucket) ? 1 : 0) == 1'
          status:
            description: ObjectSourceStatus is the observed state of the ObjectSource.
            properties:
              cacheReady:
                description: CacheReady is true when the local cache holds the object
                  at LastSyncedETag.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastProcessedReconcileToken:
                description: |-
                  LastProcessedReconcileToken records the last value of the
                  sops.stuttgart-things.com/reconcile-requested annotation that the
                  reconciler honored (cache eviction + unconditional refetch).
                type: string
              lastSyncedAt:
                description: LastSyncedAt is the wall-clock time of the last successful
                  reconcile.
                format: date-time
                type: string
              lastSyncedETag:
                description: |-
                  LastSyncedETag is the ETag (or equivalent content identifier)
                  observed at the last successful reconcile.
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sops.stuttgart-things.com
  resources:
  - gitrepositories
  - inlinesopssecrets
  - objectsources
  - sopssecretmanifests
  - sopssecrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sops.stuttgart-things.com
  resources:
  - gitrepositories/finalizers
  - inlinesopssecrets/finalizers
  - objectsources/finalizers
  - sopssecretmanifests/finalizers
  - sopssecrets/finalizers
  verbs:
  - update
- apiGroups:
  - sops.stuttgart-things.com
  resources:
  - gitrepositories/status
  - inlinesopssecrets/status
  - objectsources/status
  - sopssecretmanifests/status
  - sopssecrets/status
  verbs:
  - get
  - patch
  - update

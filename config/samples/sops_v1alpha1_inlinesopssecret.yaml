---
# InlineSopsSecret carries a SOPS-encrypted payload directly in the CR —
# no Git repo, no object store. Access control is RBAC on the CR itself.
#
# Create the inline payload with:
#   cat > /tmp/app.yaml <<'EOF'
#   database_url: postgres://app@db:5432/app
#   database_password: s3cret
#   api_token: xyz
#   EOF
#   sops --age "$(cat age.pub)" --encrypt /tmp/app.yaml
# Paste the full encrypted output into spec.encryptedYAML.
#
# The age private key Secret is shared with SopsSecret; see
# sops_v1alpha1_sopssecret.yaml for the Secret definition.
apiVersion: sops.stuttgart-things.com/v1alpha1
kind: InlineSopsSecret
metadata:
  name: app-creds-inline
  namespace: apps
  labels:
    app.kubernetes.io/name: sops-secrets-operator
spec:
  # Mapping mode: decrypted YAML must be a flat key/value map; the Data
  # list below selects which top-level keys become target Secret keys.
  mode: Mapping
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  target:
    # name defaults to metadata.name; namespace defaults to
    # metadata.namespace. type defaults to Opaque.
    type: Opaque
  data:
    - key: DATABASE_URL
      from: database_url
    - key: DATABASE_PASSWORD
      from: database_password
    - key: API_TOKEN
      from: api_token
  encryptedYAML: |
    # Replace this placeholder with the literal output of
    # `sops --age $(cat age.pub) --encrypt /tmp/app.yaml`.
    # The SOPS MAC is validated, so preserve the string byte-for-byte.
    PASTE_SOPS_ENCRYPTED_YAML_HERE
---
# InlineSopsSecret in Manifest mode: the decrypted payload is a whole
# core/v1 Secret manifest that is applied as-is (same whitelist and
# namespace-authoritative rules as SopsSecretManifest).
apiVersion: sops.stuttgart-things.com/v1alpha1
kind: InlineSopsSecret
metadata:
  name: dockerhub-pull-inline
  namespace: apps
  labels:
    app.kubernetes.io/name: sops-secrets-operator
spec:
  mode: Manifest
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  target:
    # Namespace is authoritative: the decrypted manifest's
    # metadata.namespace is ignored.
    namespace: apps
    # name overrides metadata.name in the decrypted manifest.
    # name: my-pull-secret
    adopt: false
  encryptedYAML: |
    PASTE_SOPS_ENCRYPTED_SECRET_MANIFEST_HERE

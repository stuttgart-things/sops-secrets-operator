---
# The age private key that decrypts the source file.
# Generate with: age-keygen -o age.agekey
apiVersion: v1
kind: Secret
metadata:
  name: sops-age-key
  namespace: apps
type: Opaque
stringData:
  age.agekey: |
    # created: 2026-04-21T10:00:00Z
    # public key: age1...
    AGE-SECRET-KEY-1...
---
# SopsSecret decrypts a SOPS-encrypted flat YAML file in a GitRepository
# and maps selected top-level keys into a target k8s Secret.
#
# Example source file (before encryption, committed as creds.enc.yaml):
#
#   database_url: postgres://app@db:5432/app
#   database_password: s3cret
#   api_token: xyz
#
# Encrypt it with:
#   sops --age $(cat age.pub) --encrypt --in-place creds.enc.yaml
apiVersion: sops.stuttgart-things.com/v1alpha1
kind: SopsSecret
metadata:
  name: app-creds
  namespace: apps
  labels:
    app.kubernetes.io/name: sops-secrets-operator
spec:
  source:
    repositoryRef:
      name: platform-secrets       # → GitRepository in same namespace
    path: prod/app/creds.enc.yaml
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  target:
    # name defaults to metadata.name; namespace defaults to metadata.namespace.
    # type defaults to Opaque. Set adopt: true to take over a pre-existing Secret.
    type: Opaque
  data:
    - key: DATABASE_URL            # key in the target k8s Secret
      from: database_url           # top-level key in decrypted file
    - key: DATABASE_PASSWORD
      from: database_password
    - key: API_TOKEN
      from: api_token

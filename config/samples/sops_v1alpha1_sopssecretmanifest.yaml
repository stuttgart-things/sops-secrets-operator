---
# SopsSecretManifest decrypts a SOPS-encrypted Kubernetes Secret
# manifest in a GitRepository and applies it as-is (pass-through).
#
# Example source file (before encryption, committed as secret.enc.yaml):
#
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: dockerhub-pull
#   type: kubernetes.io/dockerconfigjson
#   stringData:
#     .dockerconfigjson: |
#       {"auths":{"index.docker.io":{"auth":"BASE64..."}}}
#
# Encrypt only the data/stringData fields with:
#   sops --age $(cat age.pub) \
#        --encrypted-regex '^(data|stringData)$' \
#        --encrypt --in-place secret.enc.yaml
#
# The age private key Secret is shared with SopsSecret and defined in
# sops_v1alpha1_sopssecret.yaml.
apiVersion: sops.stuttgart-things.com/v1alpha1
kind: SopsSecretManifest
metadata:
  name: dockerhub-pull
  namespace: apps
  labels:
    app.kubernetes.io/name: sops-secrets-operator
spec:
  source:
    repositoryRef:
      name: platform-secrets
    path: prod/app/secret.enc.yaml
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  target:
    # Namespace override is authoritative: whatever the decrypted manifest
    # claims in metadata.namespace is IGNORED and replaced with this value
    # (or the CR's own namespace if unset). This prevents a writer of the
    # git repo from implying write access to arbitrary cluster namespaces.
    namespace: apps
    # Optional: override metadata.name from the decrypted manifest.
    # nameOverride: my-pull-secret
    # Set adopt: true to take over a pre-existing un-managed Secret.
    adopt: false

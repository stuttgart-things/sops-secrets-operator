---
# SopsSecret (v1alpha2) — mapping mode, GitRepository-backed.
#
# The v1alpha2 source shape replaces v1alpha1's `repositoryRef` with
# `sourceRef.{kind,name}`, so the same CR can dispatch to either a
# `GitRepository` or an `ObjectSource` (see the alternative below).
apiVersion: sops.stuttgart-things.com/v1alpha2
kind: SopsSecret
metadata:
  name: app-creds-git
  namespace: apps
spec:
  source:
    sourceRef:
      kind: GitRepository
      name: platform-secrets
    path: prod/app/creds.enc.yaml
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  data:
    - key: DATABASE_URL
      from: database_url
    - key: DATABASE_PASSWORD
      from: database_password
    - key: API_TOKEN
      from: api_token
---
# SopsSecret (v1alpha2) — mapping mode, ObjectSource-backed.
#
# `path` is required by the schema; for HTTPS-mode ObjectSources it is
# unused at fetch time (the URL points at one file). For bucket-mode
# ObjectSources `path` is the object key inside the bucket.
apiVersion: sops.stuttgart-things.com/v1alpha2
kind: SopsSecret
metadata:
  name: app-creds-https
  namespace: apps
spec:
  source:
    sourceRef:
      kind: ObjectSource
      name: shared-secrets-https
    path: shared.enc.yaml
  decryption:
    keyRef:
      name: sops-age-key
      key: age.agekey
  data:
    - key: SHARED_TOKEN
      from: shared_token

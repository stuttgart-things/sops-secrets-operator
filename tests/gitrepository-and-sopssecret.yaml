---
apiVersion: sops.stuttgart-things.com/v1alpha2
kind: GitRepository
metadata:
  name: platform-secrets
  namespace: sops-secrets-operator-system
spec:
  url: https://github.com/stuttgart-things/stuttgart-things.git
  branch: main
  # revision: v1.2.3   # pin to a tag/SHA instead of tracking a branch
  interval: 5m
  auth:
    type: basic
    secretRef:
      name: git-auth
---
apiVersion: sops.stuttgart-things.com/v1alpha2
kind: SopsSecret
metadata:
  name: app-creds
  namespace: sops-secrets-operator-system
spec:
  source:
    sourceRef:
      kind: GitRepository
      name: platform-secrets
    path: secrets/envs/vault-infra-labul.enc.yaml
  decryption:
    keyRef:
      name: sops-age
      key: age.agekey
  data:
    - key: DATABASE_URL
      from: vaultAddr
    - key: DATABASE_PASSWORD
      from: password

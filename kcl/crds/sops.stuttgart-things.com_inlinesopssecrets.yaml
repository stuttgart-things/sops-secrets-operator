---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inlinesopssecrets.sops.stuttgart-things.com
spec:
  group: sops.stuttgart-things.com
  names:
    kind: InlineSopsSecret
    listKind: InlineSopsSecretList
    plural: inlinesopssecrets
    singular: inlinesopssecret
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.conditions[?(@.type=="Applied")].status
      name: Applied
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InlineSopsSecret materializes a target Kubernetes Secret from a
          SOPS-encrypted payload embedded directly in the CR (no Git, no object
          store). Access control is RBAC on the CR itself.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InlineSopsSecretSpec describes an inline SOPS-encrypted payload that is
              materialized into a target Kubernetes Secret.
            properties:
              data:
                description: |-
                  Data is the mapping list used in Mapping mode. Required when
                  mode=Mapping; must be empty when mode=Manifest.
                items:
                  description: |-
                    DataMapping maps one key in the decrypted flat YAML to one key in the
                    target Secret's data.
                  properties:
                    from:
                      description: From is the top-level key in the decrypted flat
                        YAML file.
                      minLength: 1
                      type: string
                    key:
                      description: Key is the target k8s Secret data key.
                      minLength: 1
                      type: string
                  required:
                  - from
                  - key
                  type: object
                type: array
              decryption:
                description: DecryptionSpec configures how the source file is decrypted.
                properties:
                  keyRef:
                    description: SecretKeyRef references a key within a Secret in
                      the same namespace.
                    properties:
                      key:
                        minLength: 1
                        type: string
                      name:
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - keyRef
                type: object
              encryptedYAML:
                description: |-
                  EncryptedYAML is a SOPS-encrypted YAML document. Paste the complete
                  output of `sops --encrypt`. Its SOPS MAC is validated, so the string
                  must be preserved byte-for-byte.
                minLength: 1
                type: string
              mode:
                description: Mode selects how the decrypted content is interpreted.
                enum:
                - Mapping
                - Manifest
                type: string
              target:
                description: |-
                  InlineTarget describes the target k8s Secret for an InlineSopsSecret.

                  Namespace is always authoritative: whatever appears inside the decrypted
                  Secret manifest (Manifest mode) is ignored and replaced with this value
                  (or the CR's own namespace if unset). Unlike SopsSecretManifest this is
                  less load-bearing since the content was pasted into the CR by someone
                  with namespace write access, but we keep the invariant for consistency.
                properties:
                  adopt:
                    description: |-
                      When true, adopt a pre-existing Secret that is not already managed
                      by this operator. Defaults to false (refuse).
                    type: boolean
                  name:
                    description: |-
                      Name for the target Secret.

                      In Mapping mode, defaults to the CR's metadata.name.
                      In Manifest mode, overrides the decrypted manifest's metadata.name
                      when set; falls back to the manifest's name otherwise.
                    type: string
                  namespace:
                    description: |-
                      Namespace for the target Secret. Defaults to the CR's
                      metadata.namespace.
                    type: string
                  type:
                    description: |-
                      Type for the target Secret.

                      In Mapping mode, defaults to Opaque.
                      In Manifest mode, defaults to the decrypted manifest's type, falling
                      back to Opaque. Set here to override.
                    type: string
                type: object
            required:
            - decryption
            - encryptedYAML
            - mode
            type: object
            x-kubernetes-validations:
            - message: spec.data is required and must be non-empty when mode=Mapping
              rule: self.mode != 'Mapping' || (has(self.data) && size(self.data) >
                0)
            - message: spec.data must be empty when mode=Manifest
              rule: self.mode != 'Manifest' || !has(self.data) || size(self.data)
                == 0
          status:
            description: InlineSopsSecretStatus is the observed state of the InlineSopsSecret.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastAppliedHash:
                description: |-
                  LastAppliedHash is the SHA-256 of the most recently applied target
                  Secret.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation most recently
                  reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

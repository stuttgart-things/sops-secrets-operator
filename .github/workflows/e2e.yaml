---
name: CI - E2E
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (kind + cert-manager)
    # Dedicated kind-only runners provisioned in #43. Select them by the
    # shared `kind-testing-labda` label rather than by machine name, so
    # either kind-testing-runner-1 or -2 can pick a job up.
    #
    # This used to say `[self-hosted, kind-testing-runner-1]`, described as
    # an "array fallback". A `runs-on` array is an AND over labels, not a
    # list of alternatives — it pinned every run to that one machine. The
    # accompanying reasoning ("cancel-in-progress means only one job runs
    # at a time anyway") does not hold either: the concurrency group above
    # includes the PR number, so different PRs run concurrently by design.
    # In practice four runs queued behind one busy machine while the other
    # sat idle.
    runs-on: [self-hosted, kind-testing-labda]
    timeout-minutes: 40
    permissions:
      contents: read

    env:
      KIND_VERSION: v0.24.0
      KUBECTL_VERSION: v1.31.0

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install kind + kubectl
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSLo "$HOME/.local/bin/kind" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          curl -fsSLo "$HOME/.local/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "$HOME/.local/bin/kind" "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/kind" version
          "$HOME/.local/bin/kubectl" version --client

      - name: Scrub leftover kind cluster
        run: kind delete cluster --name sops-secrets-operator-test-e2e || true

      - name: Pre-run diagnostics
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true
          echo "=== free -h ==="
          free -h || true
          echo "=== df -h /var/lib/docker / ==="
          df -h /var/lib/docker / || true

      - name: Run e2e
        run: make test-e2e

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name sops-secrets-operator-test-e2e || true

      - name: Post-run diagnostics (on failure only)
        if: failure()
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true
          echo "=== free -h ==="
          free -h || true
          echo "=== df -h /var/lib/docker / ==="
          df -h /var/lib/docker / || true
          echo "=== last 200 lines of dockerd journal ==="
          journalctl -u docker --no-pager -n 200 || true
